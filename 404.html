<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Tushar Portfolio</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --accent-color: #e94560;
            --accent-hover: #ff5e79;
            --accent-glow: rgba(233, 69, 96, 0.25);
            --card-bg: rgba(22, 33, 62, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --gradient-primary: linear-gradient(135deg, #0f3460, #e94560);
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --speed-normal: 0.4s;
            --speed-fast: 0.2s;
            --glass-blur: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background animated decorations */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
        }

        .shape-1 {
            width: 350px;
            height: 350px;
            background: #3b82f6;
            top: -50px;
            right: -50px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #e94560;
            bottom: -80px;
            left: -80px;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: 6.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0 2rem;
            height: 50px;
            border-radius: 9999px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--speed-fast) ease;
            color: #ffffff;
            background: var(--gradient-primary);
            border: none;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--accent-glow);
            background: linear-gradient(135deg, #0e3c73, #ff5e79);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="decorations">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="error-code">404</div>
            <h1>Oops! Page not found</h1>
            <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="index.html" class="btn">
                <i class="fas fa-home"></i> Go Back Home
            </a>
        </div>
    </div>
</body>
</html>
